# TierSum Nginx 配置
# 整合 tiersum Go 后端 + tiersum-site 静态站点内容
#
# 使用方式：
#   sudo ln -sf /path/to/tiersum-site/deploy/nginx-tiersum.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 或用于 Docker 部署：
#   docker run -v /path/to/tiersum-site:/usr/share/nginx/html/site:ro ...

upstream tiersum_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name tiersum.example.com;

    # ============================================================
    # 安全头（生产环境按需调整）
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ============================================================
    # gzip 压缩
    # ============================================================
    gzip on;
    gzip_types text/plain text/markdown text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;

    # ============================================================
    # 站点 Markdown 内容页 — Nginx 直接服务静态文件（必须放在 [^/]+$ 之前）
    # tiersum-site 部署路径示例：/var/www/tiersum-site
    # 请求 /site/index.md → 对应文件 /var/www/tiersum-site/site/index.md
    # ============================================================
    location ~ ^/site/.+\.md$ {
        root /var/www/tiersum-site;
        add_header Content-Type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ============================================================
    # tiersum-site 静态站点入口（独立运行，含管理功能导航）
    # 任何 /site/* 路径（不含 .md 后缀）返回 index.html，由前端路由处理
    # ============================================================
    location ~ ^/site/[^/]+$ {
        root /var/www/tiersum-site;
        try_files /index.html =404;
    }

    location = / {
        root /var/www/tiersum-site;
        try_files /index.html =404;
    }

    # ============================================================
    # 管理系统 UI (Vue SPA) + API/BFF/MCP/健康检查 代理到 Go 后端
    # Vue SPA 在 /ui/ 路径下；API 在 /api/、/bff/、/mcp/、/health、/metrics
    # ============================================================
    location / {
        proxy_pass http://tiersum_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 缓冲
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ============================================================
    # 可选：HTTPS 重定向
    # ============================================================
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/tiersum.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tiersum.example.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # ============================================================
    # 访问与错误日志
    # ============================================================
    access_log /var/log/nginx/tiersum-access.log;
    error_log  /var/log/nginx/tiersum-error.log;
}
